<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>宋词知识发现系统</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/style.css" />
  <script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="brand">
        <h1>宋词知识发现系统</h1>
        <p>本体建模 · 图数据库 · 知识可视化</p>
      </div>
      <div class="search-bar">
        <input id="searchInput" type="text" placeholder="搜索词人、词牌、别称、乐器…" />
        <button id="searchBtn">搜索</button>
        <button id="resetBtn" class="secondary">重置</button>
      </div>
      <button id="contextBtn" class="secondary context-btn" title="查看文献背景">文献</button>
    </header>

    <main class="main">
      <div id="legendBackdrop" class="backdrop hidden" aria-hidden="true"></div>

      <aside id="legendPanel" class="legend">
        <div class="legend-header">
          <h3>图例</h3>
          <button id="legendClear" class="legend-clear hidden" title="清除筛选">清除</button>
          <button id="legendClose" class="legend-close" aria-label="关闭图例">×</button>
        </div>
        <p class="legend-hint">点击类型可筛选节点</p>
        <ul id="legendList"></ul>
      </aside>

      <section class="graph-area">
        <button id="legendToggle" class="fab legend-fab" aria-label="打开图例">图例</button>
        <div id="graph"></div>
        <div id="loading" class="loading">加载图谱中…</div>
      </section>

      <div id="panelBackdrop" class="backdrop hidden" aria-hidden="true"></div>
      <aside id="detailPanel" class="detail-panel hidden">
        <div class="panel-header">
          <h3 id="panelTitle">节点详情</h3>
          <button id="closePanel" class="close-btn" aria-label="关闭">×</button>
        </div>
        <div class="panel-body">
          <div id="detailContent" class="detail-content"></div>
          <section id="contextSection" class="context-section">
            <button id="contextToggle" class="context-toggle" aria-expanded="true">
              <span>文献背景</span>
              <span class="toggle-icon">▾</span>
            </button>
            <div id="contextContent" class="context-content">
              <p class="context-loading">加载中…</p>
            </div>
          </section>
        </div>
      </aside>
    </main>

    <footer class="timeline-bar">
      <span class="timeline-label">朝代</span>
      <div id="timelineFilters" class="timeline-filters"></div>
    </footer>
  </div>

  <script src="/assets/app.js"></script>
</body>
</html>
