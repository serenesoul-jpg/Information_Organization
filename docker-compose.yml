services:
  neo4j:
    image: neo4j:5.15
    container_name: neo4j-songci
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/songci2026
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  web:
    build: .
    container_name: songci-web
    ports:
      - "8083:8083"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: songci2026
    depends_on:
      neo4j:
        condition: service_healthy

volumes:
  neo4j_data:
